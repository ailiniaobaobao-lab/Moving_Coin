<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Coin Stimuli Demo</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f4f4;
      color: #222;
    }

    .page {
      max-width: 1500px;
      margin: 0 auto;
      padding: 18px;
    }

    .main-layout {
      display: flex;
      gap: 18px;
      align-items: flex-start;
    }

    .control-panel {
      width: 260px;
      flex: 0 0 260px;
      background: white;
      padding: 14px;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }

    .demo-area {
      flex: 1;
      background: white;
      padding: 18px;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }

    canvas {
      width: 100%;
      height: auto;
      background: #eeeeee;
      border: 2px solid #ddd;
      border-radius: 8px;
      display: block;
    }

    button {
      cursor: pointer;
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 15px;
      margin: 6px 0;
    }

    .trial-btn {
      width: 100%;
      background: #e5e5e5;
      color: #222;
      text-align: left;
    }

    .trial-btn:hover {
      background: #d0d0d0;
    }

    .trial-btn.active {
      background: #333;
      color: white;
      font-weight: bold;
    }

    .run-btn {
      width: 100%;
      background: #2d6cdf;
      color: white;
    }

    .stop-btn {
      width: 100%;
      background: #777;
      color: white;
    }

    .trial-list {
      margin-top: 14px;
    }

    .trial-settings {
      margin-top: 16px;
      padding: 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fafafa;
    }

    .trial-settings h3 {
      margin: 0 0 12px;
      font-size: 16px;
    }

    .setting-row {
      display: grid;
      gap: 8px;
    }

    .setting-row + .setting-row {
      margin-top: 14px;
    }

    .setting-row label {
      font-size: 14px;
      font-weight: bold;
    }

    .setting-row input {
      width: 100%;
    }

    .radio-options {
      display: grid;
      gap: 6px;
    }

    .radio-option {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: normal;
    }

    .radio-option input {
      width: auto;
    }

    .number-input {
      box-sizing: border-box;
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }

    .hidden {
      display: none;
    }

    .section-switch {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 14px;
    }

    .section-btn {
      background: #e5e5e5;
      color: #222;
      font-weight: bold;
      margin: 0;
      padding: 10px 8px;
    }

    .section-btn.active {
      background: #333;
      color: white;
    }
  </style>
</head>

<body>
  <div id="app-screen" class="page">
    <div class="main-layout">
      <div class="control-panel">
        <div class="section-switch">
          <button id="color-section-btn" class="section-btn" onclick="switchSection('color')">color trials</button>
          <button id="location-section-btn" class="section-btn" onclick="switchSection('location')">location trials</button>
        </div>

        <div id="trial-list" class="trial-list">
        </div>

        <div id="trial-settings" class="trial-settings hidden">
          <h3>Trial Settings</h3>
          <div class="setting-row">
            <label>Circle speed</label>
            <div class="radio-options">
              <label class="radio-option">
                <input
                  type="radio"
                  name="circle-speed"
                  value="1.25"
                  data-label="fast (1.25x)"
                  onchange="setCircleSpeed(this.value)"
                />
                fast (1.25x)
              </label>
              <label class="radio-option">
                <input
                  type="radio"
                  name="circle-speed"
                  value="1"
                  data-label="normal (1x)"
                  checked
                  onchange="setCircleSpeed(this.value)"
                />
                normal (1x)
              </label>
              <label class="radio-option">
                <input
                  type="radio"
                  name="circle-speed"
                  value="0.75"
                  data-label="slow (0.75x)"
                  onchange="setCircleSpeed(this.value)"
                />
                slow (0.75x)
              </label>
            </div>
          </div>

          <div class="setting-row">
            <label>Trial version</label>
            <div class="radio-options">
              <label class="radio-option">
                <input
                  type="radio"
                  name="trial-version"
                  value="perception"
                  onchange="setTrialVersion(this.value)"
                />
                perception
              </label>
              <label class="radio-option">
                <input
                  type="radio"
                  name="trial-version"
                  value="occlusion"
                  checked
                  onchange="setTrialVersion(this.value)"
                />
                occlusion
              </label>
            </div>
          </div>

          <div class="setting-row">
            <label>Ding timing</label>
            <div class="radio-options">
              <label class="radio-option">
                <input
                  type="radio"
                  name="ding-position"
                  value="early"
                  onchange="setTrialDingPosition(this.value)"
                />
                early
              </label>
              <label class="radio-option">
                <input
                  type="radio"
                  name="ding-position"
                  value="late"
                  onchange="setTrialDingPosition(this.value)"
                />
                late
              </label>
            </div>
          </div>

          <div id="color-probe-settings" class="setting-row hidden">
            <label>Probe condition</label>
            <div class="radio-options">
              <label class="radio-option">
                <input
                  type="radio"
                  name="color-probe-condition"
                  value="too-early"
                  onchange="setTrialProbeCondition(this.value)"
                />
                early distractor
              </label>
              <label class="radio-option">
                <input
                  type="radio"
                  name="color-probe-condition"
                  value="too-late"
                  onchange="setTrialProbeCondition(this.value)"
                />
                late distractor
              </label>
            </div>
          </div>

          <div id="location-probe-settings" class="setting-row hidden">
            <label>Probe condition</label>
            <div class="radio-options">
              <label class="radio-option">
                <input
                  type="radio"
                  name="location-probe-condition"
                  value="too-early"
                  onchange="setTrialProbeCondition(this.value)"
                />
                early distractor
              </label>
              <label class="radio-option">
                <input
                  type="radio"
                  name="location-probe-condition"
                  value="too-late"
                  onchange="setTrialProbeCondition(this.value)"
                />
                late distractor
              </label>
            </div>
          </div>

          <div id="probe-offset-settings" class="setting-row hidden">
            <label id="probe-offset-label" for="probe-offset-input">Probe offset</label>
            <input
              id="probe-offset-input"
              class="number-input"
              type="number"
              onchange="setTrialProbeOffset(this.value)"
              oninput="setTrialProbeOffset(this.value, false)"
            />
          </div>
        </div>

        <hr />

        <button class="run-btn" onclick="runCurrentTrial()">
          Replay Current Trial
        </button>

        <button class="stop-btn" onclick="stopAnimation()">
          Stop
        </button>

        <pre id="trial-info" class="hidden"></pre>
      </div>

      <div class="demo-area">
        <canvas id="stimulus-canvas" width="900" height="520"></canvas>
      </div>
    </div>
  </div>

  <script>
    // ======================================================
    // Coin Stimuli Demo
    // Single-file version
    // ======================================================

    // ------------------------------------------------------
    // Canvas setup
    // ------------------------------------------------------

    const canvas = document.getElementById("stimulus-canvas");
    const ctx = canvas.getContext("2d");

    const trialListDiv = document.getElementById("trial-list");
    const trialInfoPre = document.getElementById("trial-info");
    const colorSectionBtn = document.getElementById("color-section-btn");
    const locationSectionBtn = document.getElementById("location-section-btn");
    const trialSettings = document.getElementById("trial-settings");
    const speedInputs = document.querySelectorAll("input[name='circle-speed']");
    const trialVersionInputs = document.querySelectorAll("input[name='trial-version']");
    const dingPositionInputs = document.querySelectorAll("input[name='ding-position']");
    const colorProbeInputs = document.querySelectorAll("input[name='color-probe-condition']");
    const locationProbeInputs = document.querySelectorAll("input[name='location-probe-condition']");
    const colorProbeSettings = document.getElementById("color-probe-settings");
    const locationProbeSettings = document.getElementById("location-probe-settings");
    const probeOffsetSettings = document.getElementById("probe-offset-settings");
    const probeOffsetLabel = document.getElementById("probe-offset-label");
    const probeOffsetInput = document.getElementById("probe-offset-input");

    let currentTrial = null;
    let animationFrameId = null;
    let animationStartTime = null;
    let dingPlayed = false;
    let trueStateAtDing = null;
    let objectStopped = false;
    const SPEED_BASELINE = 0.5;
    let circleSpeed = SPEED_BASELINE;
    let currentTrialVersion = "occlusion";
    let currentProbeCondition = null;
    let currentProbeOptions = [];
    let currentProbeFeedback = null;
    let currentOccluder = null;
    let currentDingProgress = null;
    let currentDingPosition = null;
    const PROBE_MARKER_RADIUS = 14;
    const DEFAULT_COLOR_PROBE_OFFSET = 70;
    const DEFAULT_LOCATION_PROBE_OFFSET = 0.14;
    const OCCLUDER_START_MIN_PROGRESS = 0.48;
    const OCCLUDER_START_MAX_PROGRESS = 0.72;
    const OCCLUDER_MIN_LENGTH = 0.28;
    const OCCLUDER_MARKER_PADDING = 42;

    // ------------------------------------------------------
    // Ding sound
    // This creates a simple sound directly in the browser.
    // No audio file needed.
    // ------------------------------------------------------

    function playDing() {
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

      const oscillator = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();

      oscillator.type = "sine";
      oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);

      gainNode.gain.setValueAtTime(0.0001, audioCtx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.25, audioCtx.currentTime + 0.01);
      gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.25);

      oscillator.connect(gainNode);
      gainNode.connect(audioCtx.destination);

      oscillator.start(audioCtx.currentTime);
      oscillator.stop(audioCtx.currentTime + 0.28);
    }

    // ======================================================
    // TRIAL SETTINGS
    // 你之后主要改这里。
    //
    // startGray / endGray:
    // 0 = black, 255 = white
    //
    // duration:
    // 单位都是 milliseconds
    //
    // arcDirection:
    // -1 = upward semicircle, 1 = downward semicircle
    //
    // dingPosition:
    // "early" = earlier inside occluder, "late" = later inside occluder
    // The occluder is generated randomly on the second half of the path on each replay.
    //
    // probeCondition:
    // "too-early", "too-late"
    // ======================================================

    const COLOR_TRIALS = [
      {
        name: "Color 1: black → white",
        trialType: "color",

        startX: 120,
        startY: 420,
        endX: 780,
        endY: 420,
        arcDirection: -1,

        startGray: 0,
        endGray: 255,

        duration: 3000,
        dingPosition: "early",

        objectRadius: 34,

        probeMode: "color",
        probeCondition: "too-late"
      },

      {
        name: "Color 2: white → black",
        trialType: "color",

        startX: 120,
        startY: 420,
        endX: 780,
        endY: 420,
        arcDirection: -1,

        startGray: 255,
        endGray: 0,

        duration: 3000,
        dingPosition: "late",

        objectRadius: 34,

        probeMode: "color",
        probeCondition: "too-late"
      }
    ];

    const LOCATION_TRIALS = [
      {
        name: "Location 1: left lower → right lower",
        trialType: "location",

        startX: 120,
        startY: 420,
        endX: 780,
        endY: 420,
        arcDirection: -1,

        startGray: 130,
        endGray: 130,

        duration: 3000,
        dingPosition: "early",

        objectRadius: 34,

        probeMode: "location",
        probeCondition: "too-early"
      },

      {
        name: "Location 2: right lower → left lower",
        trialType: "location",

        startX: 780,
        startY: 420,
        endX: 120,
        endY: 420,
        arcDirection: -1,

        startGray: 130,
        endGray: 130,

        duration: 3000,
        dingPosition: "late",

        objectRadius: 34,

        probeMode: "location",
        probeCondition: "too-late"
      },

      {
        name: "Location 3: left upper → right upper",
        trialType: "location",

        startX: 120,
        startY: 100,
        endX: 780,
        endY: 100,
        arcDirection: 1,

        startGray: 130,
        endGray: 130,

        duration: 3000,
        dingPosition: "late",

        objectRadius: 34,

        probeMode: "location",
        probeCondition: "too-late"
      },

      {
        name: "Location 4: right upper → left upper",
        trialType: "location",

        startX: 780,
        startY: 100,
        endX: 120,
        endY: 100,
        arcDirection: 1,

        startGray: 130,
        endGray: 130,

        duration: 3000,
        dingPosition: "late",

        objectRadius: 34,

        probeMode: "location",
        probeCondition: "too-early"
      }
    ];

    // ------------------------------------------------------
    // UI functions
    // ------------------------------------------------------

    function switchSection(section) {
      stopAnimation();
      hideProbe();
      clearCanvas();
      currentTrial = null;
      trialInfoPre.textContent = "";
      hideTrialSettings();

      colorSectionBtn.classList.toggle("active", section === "color");
      locationSectionBtn.classList.toggle("active", section === "location");

      if (section === "color") {
        showTrialList(COLOR_TRIALS);
      } else if (section === "location") {
        showTrialList(LOCATION_TRIALS);
      }
    }

    function showTrialList(category) {
      stopAnimation();
      clearCanvas();
      hideProbe();
      hideTrialSettings();

      trialListDiv.innerHTML = "";

      category.forEach((trial) => {
        const btn = document.createElement("button");
        btn.className = "trial-btn";
        btn.textContent = trial.name;
        btn.onclick = () => selectTrial(trial);
        trialListDiv.appendChild(btn);
      });
    }

    function selectTrial(trial) {
      currentTrial = trial;
      updateSelectedTrialButton(trial);
      showTrialSettings();
      updateTrialInfo(trial);
      runCurrentTrial();
    }

    function updateSelectedTrialButton(trial) {
      trialListDiv.querySelectorAll(".trial-btn").forEach((button) => {
        button.classList.toggle("active", button.textContent === trial.name);
      });
    }

    function showTrialSettings() {
      setCircleSpeed(1, false);
      setTrialVersion("occlusion", false);
      syncTrialSettingControls(currentTrial);
      trialSettings.classList.remove("hidden");
    }

    function hideTrialSettings() {
      trialSettings.classList.add("hidden");
    }

    function setCircleSpeed(value, shouldReplay = true) {
      const displayedSpeed = Number(value);
      circleSpeed = displayedSpeed * SPEED_BASELINE;

      speedInputs.forEach((input) => {
        input.checked = Number(input.value) === displayedSpeed;
      });

      if (shouldReplay && currentTrial) {
        runCurrentTrial();
      }
    }

    function setTrialVersion(version, shouldReplay = true) {
      currentTrialVersion = version;

      trialVersionInputs.forEach((input) => {
        input.checked = input.value === version;
      });

      if (shouldReplay && currentTrial) {
        runCurrentTrial();
      }
    }

    function setTrialDingPosition(position, shouldReplay = true) {
      if (!currentTrial) {
        return;
      }

      currentTrial.dingPosition = position;
      syncRadioGroup(dingPositionInputs, position);

      if (shouldReplay) {
        runCurrentTrial();
      }
    }

    function setTrialProbeCondition(condition, shouldReplay = true) {
      if (!currentTrial) {
        return;
      }

      currentTrial.probeCondition = normalizeProbeCondition(condition);
      syncTrialSettingControls(currentTrial);

      if (shouldReplay) {
        runCurrentTrial();
      }
    }

    function setTrialProbeOffset(value, shouldReplay = true) {
      if (!currentTrial) {
        return;
      }

      const parsedValue = Number(value);

      if (!Number.isFinite(parsedValue)) {
        return;
      }

      if (currentTrial.probeMode === "color") {
        currentTrial.probeOffset = clamp(parsedValue, 0, 255);
      } else {
        currentTrial.probeOffset = clamp(parsedValue, 0, 0.5);
      }

      probeOffsetInput.value = currentTrial.probeOffset;
      updateTrialInfo(currentTrial);

      if (shouldReplay) {
        runCurrentTrial();
      }
    }

    function syncTrialSettingControls(trial) {
      if (!trial) {
        return;
      }

      syncRadioGroup(dingPositionInputs, trial.dingPosition);
      trial.probeCondition = normalizeProbeCondition(trial.probeCondition);

      if (trial.probeMode === "color") {
        colorProbeSettings.classList.remove("hidden");
        locationProbeSettings.classList.add("hidden");
        syncRadioGroup(colorProbeInputs, trial.probeCondition);
        syncProbeOffsetControl(trial, "Gray offset", 1, 0, 255, DEFAULT_COLOR_PROBE_OFFSET);
      } else {
        colorProbeSettings.classList.add("hidden");
        locationProbeSettings.classList.remove("hidden");
        syncRadioGroup(locationProbeInputs, trial.probeCondition);
        syncProbeOffsetControl(trial, "Position offset", 0.01, 0, 0.5, DEFAULT_LOCATION_PROBE_OFFSET);
      }
    }

    function syncProbeOffsetControl(trial, label, step, min, max, defaultValue) {
      if (trial.probeOffset === undefined) {
        trial.probeOffset = defaultValue;
      }

      probeOffsetSettings.classList.remove("hidden");
      probeOffsetLabel.textContent = label;
      probeOffsetInput.step = step;
      probeOffsetInput.min = min;
      probeOffsetInput.max = max;
      probeOffsetInput.value = trial.probeOffset;
    }

    function syncRadioGroup(inputs, value) {
      inputs.forEach((input) => {
        input.checked = input.value === value;
      });
    }

    function updateTrialInfo(trial) {
      trialInfoPre.textContent = JSON.stringify(
        {
          name: trial.name,
          trialType: trial.trialType,
          startPosition: [trial.startX, trial.startY],
          endPosition: [trial.endX, trial.endY],
          arcDirection: trial.arcDirection,
          version: currentTrialVersion,
          startGray: trial.startGray,
          endGray: trial.endGray,
          duration: trial.duration,
          dingPosition: trial.dingPosition,
          dingProgress: currentDingProgress,
          occluderStartProgress: currentOccluder?.startProgress,
          occluderEndProgress: currentOccluder?.endProgress,
          probeMode: trial.probeMode,
          probeCondition: trial.probeCondition,
          probeOffset: trial.probeOffset
        },
        null,
        2
      );
    }

    function runCurrentTrial() {
      if (!currentTrial) {
        alert("Please select a trial first.");
        return;
      }

      stopAnimation();
      hideProbe();

      animationStartTime = null;
      dingPlayed = false;
      trueStateAtDing = null;
      objectStopped = false;
      currentProbeCondition = null;
      currentProbeOptions = [];
      currentProbeFeedback = null;
      currentOccluder = createRandomOccluder(currentTrial);
      setDingPosition(currentTrial);
      updateTrialInfo(currentTrial);

      animationFrameId = requestAnimationFrame((timestamp) => {
        animationLoop(timestamp, currentTrial);
      });
    }

    function stopAnimation() {
      if (animationFrameId) {
        cancelAnimationFrame(animationFrameId);
        animationFrameId = null;
      }
    }

    function hideProbe() {
      currentProbeOptions = [];
      currentProbeFeedback = null;
      canvas.style.cursor = "default";
    }

    // ------------------------------------------------------
    // Animation logic
    // ------------------------------------------------------

    function animationLoop(timestamp, trial) {
      if (!animationStartTime) {
        animationStartTime = timestamp;
      }

      const realElapsed = timestamp - animationStartTime;
      const elapsed = realElapsed * circleSpeed;
      const progress = Math.min(elapsed / trial.duration, 1);

      const liveState = computeObjectState(trial, progress);

      // Ding moment
      if (!dingPlayed && progress >= currentDingProgress) {
        dingPlayed = true;
        trueStateAtDing = {
          ...computeObjectState(trial, currentDingProgress),
          progress: currentDingProgress
        };

        playDing();

        // Your design: ding means movement and color change both stop.
        objectStopped = true;

        console.log("DING STATE", {
          trialName: trial.name,
          elapsed: Math.round(elapsed),
          dingPosition: currentDingPosition,
          dingProgress: currentDingProgress,
          trueX: Math.round(trueStateAtDing.x),
          trueY: Math.round(trueStateAtDing.y),
          trueGray: trueStateAtDing.gray
        });

        drawScene(trial, trueStateAtDing, elapsed);
        animationFrameId = null;
        showProbe(trial);
        return;
      }

      // If ding happened, draw the stopped object.
      // If not, draw the moving object.
      const stateToDraw = objectStopped && trueStateAtDing
        ? trueStateAtDing
        : liveState;

      drawScene(trial, stateToDraw, elapsed);

      animationFrameId = requestAnimationFrame((newTimestamp) => {
        animationLoop(newTimestamp, trial);
      });
    }

    function computeObjectState(trial, progress) {
      const position = computeObjectPosition(trial, progress);
      const gray = interpolate(trial.startGray, trial.endGray, progress);

      return {
        x: position.x,
        y: position.y,
        gray: Math.round(gray)
      };
    }

    function computeObjectPosition(trial, progress) {
      if (trial.arcDirection && trial.startY === trial.endY) {
        const centerX = (trial.startX + trial.endX) / 2;
        const radius = Math.abs(trial.endX - trial.startX) / 2;
        const startAngle = trial.startX < trial.endX ? Math.PI : 0;
        const endAngle = trial.startX < trial.endX ? 0 : Math.PI;
        const angle = interpolate(startAngle, endAngle, progress);

        return {
          x: centerX + Math.cos(angle) * radius,
          y: trial.startY + trial.arcDirection * Math.sin(angle) * radius
        };
      }

      return {
        x: interpolate(trial.startX, trial.endX, progress),
        y: interpolate(trial.startY, trial.endY, progress)
      };
    }

    function setDingPosition(trial) {
      const candidates = getDingCandidates(trial);
      const chosen = candidates.find((candidate) => candidate.label === trial.dingPosition)
        || candidates.find((candidate) => candidate.label === "late")
        || candidates[0];

      currentDingPosition = chosen.label;
      currentDingProgress = chosen.progress;
    }

    function getDingCandidates(trial) {
      if (currentOccluder) {
        const markerOffset = getOccluderMarkerOffset(trial);
        const windowLength = currentOccluder.endProgress - currentOccluder.startProgress;
        const dingInset = Math.min(markerOffset, windowLength * 0.28);

        return [
          {
            label: "early",
            progress: currentOccluder.startProgress + dingInset
          },
          {
            label: "late",
            progress: currentOccluder.endProgress - dingInset
          }
        ];
      }

      const positions = [
        ["early", 0.35],
        ["late", 0.65]
      ];

      return positions.map(([label, progress]) => ({
        label,
        progress
      }));
    }

    function progressForX(trial, x) {
      if (trial.arcDirection && trial.startY === trial.endY) {
        const centerX = (trial.startX + trial.endX) / 2;
        const radius = Math.abs(trial.endX - trial.startX) / 2;
        const angle = Math.acos(clamp((x - centerX) / radius, -1, 1));

        return trial.endX > trial.startX
          ? (Math.PI - angle) / Math.PI
          : angle / Math.PI;
      }

      return (x - trial.startX) / (trial.endX - trial.startX);
    }

    function interpolate(start, end, progress) {
      return start + (end - start) * progress;
    }

    function createRandomOccluder(trial) {
      const markerOffset = getOccluderMarkerOffset(trial);
      const minWindowLength = Math.max(
        OCCLUDER_MIN_LENGTH,
        markerOffset * 2
      );
      const startMax = Math.min(
        OCCLUDER_START_MAX_PROGRESS,
        1 - minWindowLength
      );
      const startProgress = randomBetween(
        OCCLUDER_START_MIN_PROGRESS,
        Math.max(OCCLUDER_START_MIN_PROGRESS, startMax)
      );
      const endMin = startProgress + minWindowLength;
      const endProgress = randomBetween(
        Math.min(endMin, 1),
        1
      );
      const rect = getTrajectorySegmentRect(
        trial,
        startProgress,
        endProgress,
        trial.objectRadius + PROBE_MARKER_RADIUS + OCCLUDER_MARKER_PADDING
      );

      return {
        startProgress,
        endProgress,
        rect
      };
    }

    function getOccluderMarkerOffset(trial) {
      const desiredOffset = trial.probeMode === "location"
        ? trial.probeOffset ?? DEFAULT_LOCATION_PROBE_OFFSET
        : DEFAULT_LOCATION_PROBE_OFFSET;

      return clamp(desiredOffset, 0.06, 0.16);
    }

    function getTrajectorySegmentRect(trial, startProgress, endProgress, padding) {
      const points = [];

      for (let i = 0; i <= 40; i++) {
        const progress = interpolate(startProgress, endProgress, i / 40);
        points.push(computeObjectPosition(trial, progress));
      }

      const xs = points.map((point) => point.x);
      const ys = points.map((point) => point.y);
      const minX = Math.max(0, Math.min(...xs) - padding);
      const maxX = Math.min(canvas.width, Math.max(...xs) + padding);
      const minY = Math.max(0, Math.min(...ys) - padding);
      const maxY = Math.min(canvas.height, Math.max(...ys) + padding);

      return {
        x: minX,
        y: minY,
        w: maxX - minX,
        h: maxY - minY
      };
    }

    function randomBetween(min, max) {
      if (max <= min) {
        return min;
      }

      return min + Math.random() * (max - min);
    }

    // ------------------------------------------------------
    // Drawing functions
    // ------------------------------------------------------

    function clearCanvas() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#eeeeee";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function drawScene(trial, state, elapsed) {
      clearCanvas();

      drawTrajectoryGuide(trial);
      drawObject(state.x, state.y, trial.objectRadius, state.gray);

      if (currentTrialVersion !== "perception") {
        drawOccluder(trial);
        drawTrajectoryGuide(trial, getOccluderRect(trial));
      }

      drawFixation();
    }

    function drawFixation() {
      const centerX = canvas.width / 2;
      const centerY = canvas.height / 2;

      ctx.strokeStyle = "#333";
      ctx.lineWidth = 2;

      ctx.beginPath();
      ctx.moveTo(centerX - 10, centerY);
      ctx.lineTo(centerX + 10, centerY);
      ctx.moveTo(centerX, centerY - 10);
      ctx.lineTo(centerX, centerY + 10);
      ctx.stroke();
    }

    function drawTrajectoryGuide(trial, clipRect = null) {
      if (clipRect) {
        ctx.save();
        ctx.beginPath();
        ctx.rect(clipRect.x, clipRect.y, clipRect.w, clipRect.h);
        ctx.clip();
      }

      ctx.strokeStyle = "rgba(0, 0, 0, 0.18)";
      ctx.lineWidth = 2;
      ctx.setLineDash([6, 8]);

      ctx.beginPath();

      for (let i = 0; i <= 80; i++) {
        const position = computeObjectPosition(trial, i / 80);

        if (i === 0) {
          ctx.moveTo(position.x, position.y);
        } else {
          ctx.lineTo(position.x, position.y);
        }
      }

      ctx.stroke();
      ctx.setLineDash([]);

      if (clipRect) {
        ctx.restore();
      }
    }

    function drawObject(x, y, radius, gray) {
      const color = `rgb(${gray}, ${gray}, ${gray})`;

      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();

      ctx.lineWidth = 3;
      ctx.strokeStyle = "#222";
      ctx.stroke();
    }

    function drawOccluder(trial) {
      const occluder = getOccluderRect(trial);

      ctx.fillStyle = "#eeeeee";
      ctx.fillRect(
        occluder.x,
        occluder.y,
        occluder.w,
        occluder.h
      );

      ctx.lineWidth = 3;
      ctx.strokeStyle = "rgba(0, 0, 0, 0)";
      ctx.strokeRect(
        occluder.x,
        occluder.y,
        occluder.w,
        occluder.h
      );
    }

    function getOccluderRect(trial) {
      if (currentOccluder) {
        return currentOccluder.rect;
      }

      return getTrajectorySegmentRect(
        trial,
        OCCLUDER_START_MIN_PROGRESS,
        1,
        trial.objectRadius + PROBE_MARKER_RADIUS + OCCLUDER_MARKER_PADDING
      );
    }

    // ------------------------------------------------------
    // Probe functions
    // ------------------------------------------------------

    function showProbe(trial) {
      if (!trueStateAtDing) {
        return;
      }

      currentProbeFeedback = null;
      canvas.style.cursor = "pointer";

      if (trial.probeMode === "color") {
        showColorProbe(trial);
      } else if (trial.probeMode === "location") {
        showLocationProbe(trial);
      }
    }

    function showColorProbe(trial) {
      currentProbeCondition = getProbeCondition(
        trial,
        ["too-early", "too-late"]
      );
      const distractorTiming = getDistractorTiming(trial);

      const correctGray = trueStateAtDing.gray;
      const distractorGray = getColorDistractorGray(trial, distractorTiming);
      currentProbeOptions = shuffleProbeOptions([
        {
          id: "correct",
          label: "A",
          answerType: "correct",
          timing: "correct",
          gray: correctGray
        },
        {
          id: distractorTiming,
          label: "B",
          answerType: "distractor",
          timing: distractorTiming,
          gray: distractorGray
        }
      ]);

      layoutColorProbeOptions(trial, currentProbeOptions);
      drawScene(trial, trueStateAtDing, 0);
      drawProbeInstruction("Click the color that matched the ding.");
      drawColorProbeOptions(currentProbeOptions);

      console.log("COLOR PROBE", {
        trueGray: trueStateAtDing.gray,
        distractorGray: distractorGray,
        distractorTiming: distractorTiming,
        probeCondition: currentProbeCondition,
        options: currentProbeOptions
      });
    }

    function getColorDistractorGray(trial, timing) {
      const probeOffset = trial.probeOffset ?? DEFAULT_COLOR_PROBE_OFFSET;
      const direction = trial.endGray >= trial.startGray ? 1 : -1;
      const signedOffset = timing === "early"
        ? -direction * probeOffset
        : direction * probeOffset;

      return clamp(trueStateAtDing.gray + signedOffset, 0, 255);
    }

    function showLocationProbe(trial) {
      currentProbeCondition = getProbeCondition(trial, ["too-early", "too-late"]);
      const distractorTiming = getDistractorTiming(trial);
      drawScene(trial, trueStateAtDing, 0);

      const occluderProgressBounds = getOccluderProgressBounds(trial);
      const distractorProgress = getLocationProbeProgress(
        trueStateAtDing.progress,
        `too-${distractorTiming}`,
        occluderProgressBounds
      );
      const distractorState = computeObjectState(trial, distractorProgress);

      currentProbeOptions = shuffleProbeOptions([
        {
          id: "correct",
          label: "A",
          answerType: "correct",
          timing: "correct",
          x: trueStateAtDing.x,
          y: trueStateAtDing.y,
          radius: 32
        },
        {
          id: distractorTiming,
          label: "B",
          answerType: "distractor",
          timing: distractorTiming,
          x: distractorState.x,
          y: distractorState.y,
          radius: 32
        }
      ]);

      drawProbeInstruction("Click the location that matched the ding.");
      currentProbeOptions.forEach((option) => {
        drawProbeMarker(option.x, option.y);
        drawProbeMarkerLabel(option.label, option.x, option.y);
      });
      drawFixation();

      console.log("LOCATION PROBE", {
        trueX: Math.round(trueStateAtDing.x),
        trueY: Math.round(trueStateAtDing.y),
        distractorX: Math.round(distractorState.x),
        distractorY: Math.round(distractorState.y),
        distractorTiming: distractorTiming,
        probeCondition: currentProbeCondition,
        options: currentProbeOptions
      });
    }

    function getDistractorTiming(trial) {
      if (currentProbeCondition === "too-early") {
        return "early";
      }

      if (currentProbeCondition === "too-late") {
        return "late";
      }

      return "early";
    }

    function shuffleProbeOptions(options) {
      const shouldSwap = Math.random() < 0.5;
      const orderedOptions = shouldSwap ? [options[1], options[0]] : options;

      return orderedOptions.map((option, index) => ({
        ...option,
        label: index === 0 ? "A" : "B"
      }));
    }

    function getProbeCondition(trial, allowedConditions) {
      return allowedConditions.includes(trial.probeCondition)
        ? trial.probeCondition
        : "too-early";
    }

    function normalizeProbeCondition(condition) {
      return condition === "too-late" ? "too-late" : "too-early";
    }

    function getOccluderProgressBounds(trial) {
      if (currentOccluder) {
        return {
          min: currentOccluder.startProgress,
          max: currentOccluder.endProgress
        };
      }

      return {
        min: OCCLUDER_START_MIN_PROGRESS,
        max: 1
      };
    }

    function getLocationProbeProgress(correctProgress, condition, bounds) {
      const desiredOffset = currentTrial?.probeOffset ?? DEFAULT_LOCATION_PROBE_OFFSET;
      const symmetricOffset = Math.min(
        desiredOffset,
        correctProgress - bounds.min,
        bounds.max - correctProgress
      );

      if (condition === "too-early") {
        return correctProgress - symmetricOffset;
      }

      if (condition === "too-late") {
        return correctProgress + symmetricOffset;
      }

      return correctProgress;
    }

    function layoutColorProbeOptions(trial, options) {
      const optionY = trial.arcDirection === -1 ? canvas.height - 82 : 82;
      const optionSpacing = 130;
      const startX = canvas.width / 2 - optionSpacing / 2;

      options.forEach((option, index) => {
        option.x = startX + optionSpacing * index;
        option.y = optionY;
        option.radius = 38;
      });
    }

    function drawProbeInstruction(text) {
      ctx.save();
      ctx.font = "bold 18px Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillStyle = "rgba(255, 255, 255, 0.88)";
      ctx.strokeStyle = "#d0d0d0";
      ctx.lineWidth = 1;
      roundRect(ctx, canvas.width / 2 - 205, 14, 410, 38, 8);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = "#222";
      ctx.fillText(text, canvas.width / 2, 33);
      ctx.restore();
    }

    function drawColorProbeOptions(options) {
      options.forEach((option) => {
        drawColorProbeOption(option);
      });
    }

    function drawColorProbeOption(option) {
      ctx.save();
      ctx.beginPath();
      ctx.arc(option.x, option.y, option.radius + 12, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(255, 255, 255, 0.88)";
      ctx.fill();
      ctx.strokeStyle = "#cfcfcf";
      ctx.lineWidth = 2;
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(option.x, option.y, option.radius, 0, Math.PI * 2);
      ctx.fillStyle = `rgb(${option.gray}, ${option.gray}, ${option.gray})`;
      ctx.fill();
      ctx.strokeStyle = "#222";
      ctx.lineWidth = 3;
      ctx.stroke();

      ctx.font = "bold 18px Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillStyle = "#222";
      ctx.fillText(option.label, option.x, option.y + option.radius + 28);
      ctx.restore();
    }

    function drawProbeMarker(x, y) {
      ctx.beginPath();
      ctx.arc(x, y, PROBE_MARKER_RADIUS, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(255, 0, 0, 0.45)";
      ctx.fill();

      ctx.lineWidth = 3;
      ctx.strokeStyle = "red";
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(x - 22, y);
      ctx.lineTo(x + 22, y);
      ctx.moveTo(x, y - 22);
      ctx.lineTo(x, y + 22);
      ctx.stroke();
    }

    function drawProbeMarkerLabel(label, x, y) {
      ctx.save();
      ctx.font = "bold 16px Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillStyle = "#333";
      ctx.beginPath();
      ctx.arc(x, y - 32, 15, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "white";
      ctx.fillText(label, x, y - 32);
      ctx.restore();
    }

    function drawProbeFeedback(option, isCorrect) {
      const mark = isCorrect ? "✓" : "✕";
      const color = isCorrect ? "#138a36" : "#c62828";
      const feedbackX = option.x + option.radius + 28;
      const feedbackY = option.y - option.radius - 2;

      ctx.save();
      ctx.font = "bold 42px Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillStyle = color;
      ctx.fillText(mark, feedbackX, feedbackY);
      ctx.restore();
    }

    function redrawProbeWithFeedback() {
      if (!currentTrial || !trueStateAtDing) {
        return;
      }

      drawScene(currentTrial, trueStateAtDing, 0);

      if (currentTrial.probeMode === "color") {
        drawProbeInstruction("Click the color that matched the ding.");
        drawColorProbeOptions(currentProbeOptions);
      } else if (currentTrial.probeMode === "location") {
        drawProbeInstruction("Click the location that matched the ding.");
        currentProbeOptions.forEach((option) => {
          drawProbeMarker(option.x, option.y);
          drawProbeMarkerLabel(option.label, option.x, option.y);
        });
        drawFixation();
      }

      if (currentProbeFeedback) {
        drawProbeFeedback(
          currentProbeFeedback.option,
          currentProbeFeedback.isCorrect
        );
      }
    }

    function getCanvasClickPosition(event) {
      const rect = canvas.getBoundingClientRect();

      return {
        x: (event.clientX - rect.left) * (canvas.width / rect.width),
        y: (event.clientY - rect.top) * (canvas.height / rect.height)
      };
    }

    function findClickedProbeOption(position) {
      return currentProbeOptions.find((option) => {
        const dx = position.x - option.x;
        const dy = position.y - option.y;
        const hitRadius = option.radius + 10;

        return Math.sqrt(dx * dx + dy * dy) <= hitRadius;
      });
    }

    function handleCanvasClick(event) {
      if (!currentTrial || !currentProbeOptions.length) {
        return;
      }

      const clickedOption = findClickedProbeOption(getCanvasClickPosition(event));

      if (clickedOption) {
        recordResponse(clickedOption.id);
      }
    }

    function recordResponse(response) {
      if (!currentTrial || !currentProbeOptions.length) {
        return;
      }

      const selectedOption = currentProbeOptions.find((option) => option.id === response);
      const correctOption = currentProbeOptions.find((option) => option.answerType === "correct");

      if (!selectedOption || !correctOption) {
        return;
      }

      const correctResponse = correctOption?.id;
      const isCorrect = response === correctResponse;

      currentProbeFeedback = {
        option: selectedOption,
        isCorrect: isCorrect
      };
      redrawProbeWithFeedback();

      console.log("RESPONSE", {
        trialName: currentTrial.name,
        trialType: currentTrial.trialType,
        trialVersion: currentTrialVersion,
        probeMode: currentTrial.probeMode,
        probeCondition: currentProbeCondition,
        response: response,
        selectedTiming: selectedOption?.timing,
        correctResponse: correctResponse,
        isCorrect: isCorrect,
        trueStateAtDing: {
          x: Math.round(trueStateAtDing.x),
          y: Math.round(trueStateAtDing.y),
          gray: trueStateAtDing.gray
        }
      });
    }

    // ------------------------------------------------------
    // Utility
    // ------------------------------------------------------

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function roundRect(context, x, y, width, height, radius) {
      context.beginPath();
      context.moveTo(x + radius, y);
      context.lineTo(x + width - radius, y);
      context.quadraticCurveTo(x + width, y, x + width, y + radius);
      context.lineTo(x + width, y + height - radius);
      context.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      context.lineTo(x + radius, y + height);
      context.quadraticCurveTo(x, y + height, x, y + height - radius);
      context.lineTo(x, y + radius);
      context.quadraticCurveTo(x, y, x + radius, y);
      context.closePath();
    }

    // Initialize
    canvas.addEventListener("click", handleCanvasClick);
    switchSection("color");
    clearCanvas();
  </script>
</body>
</html>
